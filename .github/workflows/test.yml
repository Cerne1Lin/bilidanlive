name: 'publish'

on:
  workflow_dispatch:   # 仅手动触发

jobs:
  publish-tauri:
    permissions:
      contents: write   # 如果不创建 Release，此权限非必需，但保留无影响
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            target_dir: 'aarch64-apple-darwin' 
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            target_dir: 'x86_64-apple-darwin'
          - platform: 'windows-latest'
            args: 'release'
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          # 没有 tagName / releaseName，所以不会创建 Release
      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-${{ matrix.platform }}
          path: ${{ github.workspace }}/src-tauri/target/${{ matrix.target_dir }}/bundle/**
